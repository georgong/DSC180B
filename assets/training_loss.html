      // Match Plotly colors in assets/graph_loss_curve.html
      GraphSAGE: "#1f77b4",
      RGCN: "#d62728",
      HGT: "#f2c300"
    };

    const svg = d3.select("#chart");
    const g = svg.append("g");
    const gGrid = g.append("g").attr("class", "grid");
    const gXAxis = g.append("g").attr("class", "axis x");
    const gYAxis = g.append("g").attr("class", "axis y");
    const gLines = g.append("g").attr("class", "lines");
    const gLegend = g.append("g").attr("class", "legend");
    const gHover = g.append("g").attr("class", "hover").style("display", "none");

    const models = ["GraphSAGE", "RGCN", "HGT"];

    function render() {
      const bbox = svg.node().getBoundingClientRect();
      const width = Math.max(320, bbox.width);
      const height = Math.max(240, bbox.height);
      svg.attr("viewBox", [0, 0, width, height]);

      const margin = { top: 8, right: 14, bottom: 34, left: 54 };
      const innerW = Math.max(10, width - margin.left - margin.right);
      const innerH = Math.max(10, height - margin.top - margin.bottom);
      g.attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleLinear()
        .domain(d3.extent(DATA, d => d.step))
        .range([0, innerW]);

      const allY = [];
      for (const m of models) for (const d of DATA) allY.push(d[m]);
      const yMin = d3.min(allY);
      const yMax = d3.max(allY);
      const yPad = (yMax - yMin) * 0.06;
      const y = d3.scaleLinear()
        .domain([Math.max(0, yMin - yPad), yMax + yPad])
        .nice()
        .range([innerH, 0]);

      const xAxis = d3.axisBottom(x).ticks(Math.min(8, Math.floor(innerW / 90)));
      const yAxis = d3.axisLeft(y).ticks(Math.min(8, Math.floor(innerH / 60)));

      gXAxis.attr("transform", `translate(0,${innerH})`).call(xAxis);
      gYAxis.call(yAxis);

      // Grid
      gGrid.selectAll("*").remove();
      gGrid.append("g")
        .selectAll("line")
        .data(y.ticks(Math.min(8, Math.floor(innerH / 60))))
        .join("line")
        .attr("x1", 0).attr("x2", innerW)
        .attr("y1", d => y(d)).attr("y2", d => y(d));

      // Axis labels
      g.selectAll(".x-label").data([0]).join("text")
        .attr("class", "x-label")
        .attr("x", innerW / 2)
        .attr("y", innerH + 30)
        .attr("text-anchor", "middle")
        .attr("fill", "#475569")
        .attr("font-size", 12)
        .text("Training step");

      g.selectAll(".y-label").data([0]).join("text")
        .attr("class", "y-label")
        .attr("transform", `translate(${-42},${innerH/2}) rotate(-90)`)
        .attr("text-anchor", "middle")
        .attr("fill", "#475569")
        .attr("font-size", 12)
        .text("Smooth L1 loss");

      // Lines
      const line = model => d3.line()
        .x(d => x(d.step))
        .y(d => y(d[model]))
        .curve(d3.curveMonotoneX);

      const sel = gLines.selectAll("path.line").data(models, d => d);
      sel.join(
        enter => enter.append("path")
          .attr("class", "line")
          .attr("stroke", d => COLORS[d] || "#94a3b8")
          .attr("d", d => line(d)(DATA)),
        update => update
          .attr("stroke", d => COLORS[d] || "#94a3b8")
          .attr("d", d => line(d)(DATA))
      );

      // Legend
      gLegend.selectAll("*").remove();
      const legendItems = gLegend.selectAll("g.item")
        .data(models)
        .join("g")
        .attr("class", "item")
        .attr("transform", (d, i) => `translate(0,${i * 18})`);

      legendItems.append("line")
        .attr("x1", 0).attr("x2", 18)
        .attr("y1", 6).attr("y2", 6)
        .attr("stroke-width", 3)
        .attr("stroke", d => COLORS[d]);

      legendItems.append("text")
        .attr("x", 24).attr("y", 10)
        .text(d => d);

      gLegend.attr("transform", `translate(${innerW - 130},${6})`);

      // Hover interaction (rebuild each render for correct scales)
      gHover.selectAll("*").remove();
      const hoverLine = gHover.append("line")
        .attr("class", "hover-line")
        .attr("y1", 0)
        .attr("y2", innerH);

      const hoverDots = gHover.selectAll("circle.hover-dot")
        .data(models)
        .join("circle")
        .attr("class", "hover-dot")
        .attr("r", 4.5)
        .attr("fill", d => COLORS[d]);

      const overlay = g.selectAll("rect.overlay").data([0]).join("rect")
        .attr("class", "overlay")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", innerW)
        .attr("height", innerH)
        .attr("fill", "transparent")
        .style("cursor", "crosshair");

      const bisect = d3.bisector(d => d.step).left;
      const tooltip = document.getElementById("tooltip");
      const fmt = d3.format(".4f");

      function showTooltip(evt, dRow) {
        tooltip.innerHTML =
          `<span class="step">Step: ${dRow.step}</span>` +
          models.map(m =>
            `<div class="row"><span class="swatch" style="background:${COLORS[m]}"></span>` +
            `<span>${m}</span><span style="margin-left:auto; opacity:0.95">${fmt(dRow[m])}</span></div>`
          ).join("");
        tooltip.style.opacity = "1";
        tooltip.style.left = `${evt.clientX}px`;
        tooltip.style.top = `${evt.clientY}px`;
      }

      function hideTooltip() {
        tooltip.style.opacity = "0";
      }

      function onMove(evt) {
        const [mx] = d3.pointer(evt, overlay.node());
        const x0 = x.invert(mx);
        const i = bisect(DATA, x0, 1);
        const d0 = DATA[i - 1] ?? DATA[0];
        const d1 = DATA[i] ?? DATA[DATA.length - 1];
        const dRow = (x0 - d0.step) < (d1.step - x0) ? d0 : d1;

        const px = x(dRow.step);
        hoverLine.attr("x1", px).attr("x2", px);
        hoverDots
          .attr("cx", px)
          .attr("cy", m => y(dRow[m]));

        gHover.style("display", null);
        showTooltip(evt, dRow);
      }

      overlay
        .on("mouseenter", () => { gHover.style("display", null); })
        .on("mouseleave", () => { gHover.style("display", "none"); hideTooltip(); })
        .on("mousemove", onMove);
    }

    // Initial render + resize observer
    render();
    const ro = new ResizeObserver(() => render());
    ro.observe(document.getElementById("wrap"));
