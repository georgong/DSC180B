<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comparison of Regression Metrics by Model</title>
    <script src="d3.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: #0f172a;
      }
      #wrap {
        width: 100%;
        height: 100%;
        padding: 14px 14px 10px 14px;
        box-sizing: border-box;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 10px 0;
      }
      svg {
        width: 100%;
        height: calc(100% - 28px);
        display: block;
      }
      .axis text {
        fill: #475569;
        font-size: 11px;
      }
      .axis path,
      .axis line {
        stroke: #cbd5e1;
      }
      .grid line {
        stroke: #e2e8f0;
      }
      .legend {
        font-size: 12px;
        fill: #0f172a;
      }
      .bar {
        shape-rendering: crispEdges;
      }
      .tooltip {
        position: fixed;
        pointer-events: none;
        z-index: 10;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.25;
        box-shadow: 0 10px 25px rgba(2, 6, 23, 0.25);
        opacity: 0;
        transform: translate(10px, 10px);
        transition: opacity 120ms ease;
        white-space: nowrap;
      }
      .tooltip .k {
        font-weight: 700;
        display: block;
        margin-bottom: 6px;
      }
      .tooltip .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 3px 0;
      }
      .tooltip .swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div class="title">Comparison of Regression Metrics by Model</div>
      <svg id="chart" aria-label="Metrics bar chart"></svg>
    </div>
    <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

    <script>
      // Metrics from Figure~\\ref{fig:bar}
      const CATEGORIES = ["MAE", "Smooth L1", "RMSE"];
      const SERIES = [
        { name: "GraphSAGE", color: "rgb(31, 119, 180)", values: [1.5366, 1.2719, 8.4262] },
        { name: "MLP",      color: "rgb(255, 127, 14)", values: [1.7866, 1.4974, 8.7856] },
        { name: "LightGBM", color: "rgb(44, 160, 44)",  values: [2.0771, 1.8309,10.0344] }
      ];

      const svg = d3.select("#chart");
      const g = svg.append("g");
      const gGrid = g.append("g").attr("class", "grid");
      const gXAxis = g.append("g").attr("class", "axis x");
      const gYAxis = g.append("g").attr("class", "axis y");
      const gBars = g.append("g").attr("class", "bars");
      const gLegend = g.append("g").attr("class", "legend");

      const tooltip = document.getElementById("tooltip");
      const fmt = d3.format(".4f");

      function render() {
        const bbox = svg.node().getBoundingClientRect();
        const width = Math.max(320, bbox.width);
        const height = Math.max(240, bbox.height);
        svg.attr("viewBox", [0, 0, width, height]);

        const margin = { top: 6, right: 10, bottom: 38, left: 54 };
        const innerW = Math.max(10, width - margin.left - margin.right);
        const innerH = Math.max(10, height - margin.top - margin.bottom);
        g.attr("transform", `translate(${margin.left},${margin.top})`);

        const x0 = d3.scaleBand().domain(CATEGORIES).range([0, innerW]).paddingInner(0.18);
        const x1 = d3.scaleBand().domain(SERIES.map(s => s.name)).range([0, x0.bandwidth()]).padding(0.10);

        const allVals = SERIES.flatMap(s => s.values);
        const yMax = d3.max(allVals);
        const y = d3.scaleLinear().domain([0, yMax * 1.10]).nice().range([innerH, 0]);

        gXAxis.attr("transform", `translate(0,${innerH})`).call(d3.axisBottom(x0));
        gYAxis.call(d3.axisLeft(y).ticks(Math.min(8, Math.floor(innerH / 55))));

        // Grid
        gGrid.selectAll("*").remove();
        gGrid
          .append("g")
          .selectAll("line")
          .data(y.ticks(Math.min(8, Math.floor(innerH / 55))))
          .join("line")
          .attr("x1", 0)
          .attr("x2", innerW)
          .attr("y1", d => y(d))
          .attr("y2", d => y(d));

        // Axis labels
        g.selectAll(".x-label")
          .data([0])
          .join("text")
          .attr("class", "x-label")
          .attr("x", innerW / 2)
          .attr("y", innerH + 32)
          .attr("text-anchor", "middle")
          .attr("fill", "#475569")
          .attr("font-size", 12)
          .text("Metric");

        g.selectAll(".y-label")
          .data([0])
          .join("text")
          .attr("class", "y-label")
          .attr("transform", `translate(${-42},${innerH / 2}) rotate(-90)`)
          .attr("text-anchor", "middle")
          .attr("fill", "#475569")
          .attr("font-size", 12)
          .text("Value");

        // Bars
        const rows = CATEGORIES.map((cat, ci) => ({
          category: cat,
          values: SERIES.map(s => ({
            category: cat,
            model: s.name,
            color: s.color,
            value: s.values[ci]
          }))
        }));

        const groups = gBars.selectAll("g.group").data(rows, d => d.category);
        const groupsEnter = groups
          .join(enter => enter.append("g").attr("class", "group"))
          .attr("transform", d => `translate(${x0(d.category)},0)`);

        const bars = groupsEnter.selectAll("rect.bar").data(d => d.values, d => d.model);
        bars
          .join("rect")
          .attr("class", "bar")
          .attr("x", d => x1(d.model))
          .attr("y", d => y(d.value))
          .attr("width", x1.bandwidth())
          .attr("height", d => innerH - y(d.value))
          .attr("fill", d => d.color)
          .on("mouseenter", (evt, d) => {
            tooltip.innerHTML =
              `<span class="k">${d.category}</span>` +
              `<div class="row"><span class="swatch" style="background:${d.color}"></span>` +
              `<span>${d.model}</span><span style="margin-left:auto; opacity:0.95">${fmt(d.value)}</span></div>`;
            tooltip.style.opacity = "1";
          })
          .on("mousemove", (evt) => {
            const wrap = document.getElementById("wrap");
            const wrapRect = wrap.getBoundingClientRect();
            const ttRect = tooltip.getBoundingClientRect();
            const centerX = wrapRect.left + wrapRect.width / 2;
            const preferRight = evt.clientX < centerX;
            const dx = 14;
            const dy = 12;
            let left = evt.clientX + (preferRight ? dx : -ttRect.width - dx);
            let top = evt.clientY + dy;
            const pad = 8;
            const maxLeft = wrapRect.right - ttRect.width - pad;
            const minLeft = wrapRect.left + pad;
            const maxTop = wrapRect.bottom - ttRect.height - pad;
            const minTop = wrapRect.top + pad;
            left = Math.max(minLeft, Math.min(maxLeft, left));
            top = Math.max(minTop, Math.min(maxTop, top));
            tooltip.style.left = `${left}px`;
            tooltip.style.top = `${top}px`;
          })
          .on("mouseleave", () => {
            tooltip.style.opacity = "0";
          });

        // Legend
        gLegend.selectAll("*").remove();
        const legendItems = gLegend
          .selectAll("g.item")
          .data(SERIES)
          .join("g")
          .attr("class", "item")
          .attr("transform", (d, i) => `translate(0,${i * 18})`);

        legendItems
          .append("rect")
          .attr("x", 0)
          .attr("y", 2)
          .attr("width", 12)
          .attr("height", 12)
          .attr("rx", 3)
          .attr("fill", d => d.color);

        legendItems
          .append("text")
          .attr("x", 18)
          .attr("y", 12)
          .text(d => d.name);

        gLegend.attr("transform", `translate(${innerW - 140},${6})`);
      }

      render();
      const ro = new ResizeObserver(() => render());
      ro.observe(document.getElementById("wrap"));
    </script>
  </body>
</html>
